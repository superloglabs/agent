name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: cargo build
        working-directory: superlog-log
        run: cargo build --release
      - name: plutil lint
        run: plutil -lint launchd/sh.superlog.agent.plist
